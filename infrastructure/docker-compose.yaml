version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: postKid-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postKid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - postkid-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: postKid-redis
    networks:
      - postkid-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: postKid-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - postkid-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    image: postkid-backend
    container_name: postKid-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - postkid-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8080/actuator/health || wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ../frontend
    image: postkid-frontend
    container_name: postKid-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - postkid-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f vite || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongodb_data:

networks:
  postkid-network:
    driver: bridge
